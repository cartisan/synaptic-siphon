# Synaptic Siphon configuration.
# Edit these values in place; both CLIs read this file at startup.

[recorder]
sample_rate = 44100
channels = 1
chunk_seconds = 10
silence_threshold_db = -40.0   # frames quieter than this (RMS) are treated as silence
silence_min_ms = 200            # silence shorter than this is kept (avoids clipping speech)
drop_last_short_chunk = true    # if the tail is < chunk_seconds, drop it instead of saving a stub

[generator]
min_clips = 6
max_clips = 12
crossfade_ms = 1500
output_bitrate = "192k"
random_seed = 0                 # 0 = nondeterministic; any other int = reproducible

[generator.heart]
volume = 0.15                   # 0.0 disables the effect entirely
bpm = 30                        # heart rate of the big creature
fundamental_hz = 50.0           # pitch of each thump
beat_decay = 0.4                # seconds of exponential tail per thump

[generator.bubbles]
volume = 0.10                   # 0.0 disables
density = 1.2                   # average bursts per second (Poisson)
brightness_hz = 1200.0          # top of each bubble's rising chirp

[generator.lowpass]
cutoff_hz = 3000.0              # underwater feel; raise toward 20000 to effectively disable
order = 4                       # Butterworth order
